<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Cart</title>

<!-- jQuery CDN -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        background:#f4f4f4;
    }

    .header {
        background:#222;
        color:#fff;
        padding:15px;
        text-align:center;
        font-size:18px;
    }

    .products {
        width:700px;
        margin:30px auto;
    }

    .product {
        background:#fff;
        padding:15px;
        margin-bottom:15px;
        border-radius:6px;
        box-shadow:0 0 6px rgba(0,0,0,0.1);
    }

    button {
        padding:8px 12px;
        cursor:pointer;
    }

    .msg {
        margin-left:10px;
        color:green;
        font-weight:bold;
    }
</style>
</head>

<body>

<div class="header">
    🛒 Cart Items: <span id="cartCount">0</span>
</div>

<div class="products" id="productList">

    <div class="product">
        <h4>Wireless Mouse</h4>
        <button class="addBtn">Add to Cart</button>
        <span class="msg"></span>
    </div>

    <div class="product">
        <h4>Bluetooth Headphones</h4>
        <button class="addBtn">Add to Cart</button>
        <span class="msg"></span>
    </div>

    <div class="product">
        <h4>USB Keyboard</h4>
        <button class="addBtn">Add to Cart</button>
        <span class="msg"></span>
    </div>

    <div class="product">
        <h4>Webcam HD</h4>
        <button class="addBtn">Add to Cart</button>
        <span class="msg"></span>
    </div>

</div>

<script>
$(document).ready(function () {

    let cartCount = 0;

    // Event Delegation
    $("#productList").on("click", ".addBtn", function () {

        cartCount++;

        // update counter
        $("#cartCount").text(cartCount);

        // disable button
        $(this)
            .prop("disabled", true)
            .attr("data-added", "true");

        // confirmation message
        $(this).siblings(".msg").text("Added!");
    });

});
</script>

</body>
</html>
